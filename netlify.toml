# ========================================================
#  BasedUndeads — Netlify Configuration
#  Multi-page site with clean URLs + hardened security
# ========================================================

[build]
  publish   = "website"
  functions = "website/netlify/functions"

[dev]
  publish   = "website"
  port      = 8888
  framework = "#static"

# ============================================================
#  REDIRECTS
#  - Force HTTPS + canonical apex domain
#  - Clean URLs (no .html in address bar)
# ============================================================

# Force www → apex (so www.basedundeads.xyz redirects to basedundeads.xyz)
# 301! with the bang means: always do it, even if a www file exists
[[redirects]]
  from   = "https://www.basedundeads.xyz/*"
  to     = "https://basedundeads.xyz/:splat"
  status = 301
  force  = true

# -------- Clean URLs (no .html in browser bar) --------
[[redirects]]
  from   = "/stake"
  to     = "/staking.html"
  status = 200

[[redirects]]
  from   = "/staking"
  to     = "/staking.html"
  status = 200

[[redirects]]
