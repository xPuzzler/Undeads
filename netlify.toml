# ============================================================
#  GLOBAL SECURITY HEADERS
#  Applied to every response site-wide.
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # ── HTTPS enforcement (1 year, all subdomains, preload-ready) ──
    # Once a browser sees this, it refuses to connect over HTTP for 1 year.
    # `preload` qualifies for hstspreload.org submission (forever fix).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

    # ── Clickjacking protection (you can embed your own iframes, no one else can) ──
    X-Frame-Options = "SAMEORIGIN"

    # ── Block MIME-type sniffing attacks ──
    X-Content-Type-Options = "nosniff"

    # ── Don't leak full URLs to third-party sites in Referer header ──
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Block sensors you'll never use (extra hardening) ──
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    # ── Protect against opener attacks when users click external links ──
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

# ============================================================
#  CACHE HEADERS
#  Long cache for static assets, no cache for HTML
#  (so updates ship immediately, but images/scripts are fast)
# ============================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/abis/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"