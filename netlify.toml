# ========================================================
#  BasedUndeads — Netlify Configuration
#  Multi-page site with clean URLs + hardened security
# ========================================================

[build]
  publish   = "website"
  functions = "website/netlify/functions"

[dev]
  publish   = "website"
  port      = 8888
  framework = "#static"

# ============================================================
#  REDIRECTS
# ============================================================

[[redirects]]
  from   = "https://www.basedundeads.xyz/*"
  to     = "https://basedundeads.xyz/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/stake"
  to     = "/staking.html"
  status = 200

[[redirects]]
  from   = "/staking"
  to     = "/staking.html"
  status = 200

[[redirects]]
  from   = "/game"
  to     = "/game.html"
  status = 200

[[redirects]]
  from   = "/tools"
  to     = "/tools.html"
  status = 200

[[redirects]]
  from   = "/validator"
  to     = "/validate.html"
  status = 200

[[redirects]]
  from   = "/validate"
  to     = "/validate.html"
  status = 200

[[redirects]]
  from   = "/overview"
  to     = "/overview.html"
  status = 200

[[redirects]]
  from   = "/staking-guide"
  to     = "/staking-guide.html"
  status = 200

[[redirects]]
  from   = "/guide"
  to     = "/staking-guide.html"
  status = 200

[[redirects]]
  from   = "/deployment"
  to     = "/deployment-tracker.html"
  status = 200

# ============================================================
#  GLOBAL SECURITY HEADERS
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none'"

# ============================================================
#  CACHE HEADERS
# ============================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/abis/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"